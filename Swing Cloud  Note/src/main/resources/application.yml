server:
  port: 8080  # 服务端口

spring:
  datasource:
    # 1. 本地数据库：保持 "localhost" 不变
    # 2. 远程数据库：请把 "localhost" 改为服务器 IP (如 192.168.1.50 )
    url: jdbc:mysql://localhost:3306/数据库名称?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true  # 3. 这里填你的数据库名称
    username: root # 4. 这里填你的 MySQL 用户名（一般默认root，如有修改请填写实际用户名）
    password: 数据库密码 # 5. 这里填你的 MySQL 密码

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
